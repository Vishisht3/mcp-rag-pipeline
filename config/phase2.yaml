version: "2.0.0"

chunking:
  min_tokens: 500
  max_tokens: 800
  overlap_tokens: 100
  tokenizer: "cl100k_base"

embedding:
  provider: "openai"
  model: "text-embedding-3-small"
  dimensions: 1536
  batch_size: 64

vector_store:
  backend: "chroma"
  chroma:
    persist_directory: "./chroma_db"
    collection_name: "rag_phase2"
  weaviate:
    url: "http://localhost:8080"
    class_name: "RagChunk"

retrieval:
  top_k: 5
  score_threshold: 0.0
  include_metadata: true

  hybrid:
    enabled: true
    vector_weight: 0.6
    bm25_weight: 0.4
    candidate_multiplier: 4

  reranker:
    enabled: true
    model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    top_k_after_rerank: 5

citation_enforcement:
  enabled: true
  min_citations_required: 1
  citation_pattern: "\\[([a-f0-9]{8}:\\d+)\\]"
  on_violation: "retry"
  max_retries: 2

prompts:
  rag_system: |
    You are a precise research assistant. Answer the user's question using ONLY
    the provided context chunks.

    CITATION RULES (strictly enforced):
    1. Every factual claim MUST include an inline citation: [doc_id:chunk_index]
    2. Use the exact citation IDs shown in the context headers — do not invent them.
    3. Multiple citations are allowed per sentence: [id1] [id2]
    4. If the context is insufficient, respond: "I don't have enough information."
    5. Never add knowledge beyond what the context contains.

  rag_user: |
    Context chunks:
    {context}

    Question: {question}

    Answer (every claim must be cited with [doc_id:chunk_index]):

  rag_retry: |
    Your previous answer was missing required inline citations [doc_id:chunk_index].

    Rewrite the answer below, ensuring EVERY factual claim has a citation.
    Use ONLY the citation IDs from the context headers.

    Original answer:
    {previous_answer}

    Context chunks:
    {context}

    Corrected answer (with citations):
